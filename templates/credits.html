<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credits - RoLock</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-2FNMG5MCC0"></script>
<script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-2FNMG5MCC0');
</script>
<body>
    <header>
        <div class="header-left">
            <a class="logo" href="/">RoLock</a>
            <span class="header-divider">/</span>
            <span class="header-sub">Credits</span>
        </div>
        <a class="github-link" href="/banlist">Banlist</a>
        <a class="github-link" href="https://discord.gg/5dmQNrjJhW" target="_blank">Discord</a>
        <a class="github-link" href="https://github.com/TheHaloDeveloper/EToHLockWebsite" target="_blank">GitHub</a>
    </header>

    <main class="credits-main">
        <div class="credits-grid">
            {% for person in credits %}
                <div class="credit-card">
                    <div class="credit-img-wrap">
                        <img src="{{ person.image }}" alt="{{ person.name }}">
                    </div>
                    <div class="credit-body">
                        <span class="credit-name">{{ person.name }}</span>
                        <span class="credit-role">{{ person.role }}</span>
                        <p class="credit-bio">{{ person.bio }}</p>
                    </div>
                </div>
            {% endfor %}
        </div>
    </main>

</body>
</html>
